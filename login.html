<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c1324">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Gastos — Acceso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0c1324;--surface:#0c1324;--card:rgba(30,37,58,0.55);--border:rgba(198,198,205,0.09);--border-2:rgba(198,198,205,0.18);--text:#dce1fb;--muted:rgba(220,225,251,0.5);--accent:#bec6e0;--accent-2:#8f9ab8;--on-accent:#20263a;--danger:#ffb4ab;--success:#7fe3c4;--purple:#a892f5;--radius:22px;--radius-sm:14px}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden}
    .bg-blobs{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
    .bg-blobs .blob{position:absolute;border-radius:50%;filter:blur(70px);animation:float 9s ease-in-out infinite}
    .bg-blobs .b1{top:-80px;left:-60px;width:280px;height:280px;background:var(--accent);opacity:.16}
    .bg-blobs .b2{top:45%;right:-120px;width:320px;height:320px;background:var(--purple);opacity:.16;animation-delay:2.5s}
    .bg-blobs .b3{bottom:-100px;left:30%;width:260px;height:260px;background:var(--success);opacity:.1;animation-delay:5s}
    @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-18px) scale(1.06)}}
    .wrap{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .logo{width:72px;height:72px;border-radius:22px;background:linear-gradient(145deg,var(--accent-2),var(--accent));display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px;box-shadow:0 8px 32px rgba(190,198,224,0.3);border:1px solid rgba(255,255,255,0.15)}
    .title{font-size:28px;font-weight:800;letter-spacing:-0.8px;margin-bottom:4px}
    .title span{color:var(--accent)}
    .subtitle{font-size:14px;color:var(--muted);margin-bottom:36px;font-weight:500}
    .card{background:rgba(25,31,49,0.55);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border-2);border-radius:var(--radius);padding:24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
    .tabs{display:flex;gap:4px;margin-bottom:24px;background:rgba(255,255,255,0.03);border-radius:var(--radius-sm);padding:4px}
    .tab{flex:1;padding:10px;font-size:14px;font-weight:700;border:none;background:none;color:var(--muted);border-radius:11px;cursor:pointer;transition:all .15s;font-family:inherit}
    .tab.active{background:var(--accent);color:var(--on-accent)}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;font-weight:700}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
    input{width:100%;background:rgba(255,255,255,0.03);backdrop-filter:blur(4px);border:1.5px solid var(--border-2);border-radius:var(--radius-sm);padding:14px;color:var(--text);font-size:15px;outline:none;transition:all .2s;font-family:inherit;font-weight:500}
    input:focus{background:rgba(255,255,255,0.07);border-color:var(--accent);box-shadow:0 0 0 3px rgba(190,198,224,0.18)}
    .btn{position:relative;overflow:hidden;width:100%;padding:16px;background:var(--accent);color:var(--on-accent);border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity .15s;font-family:inherit}
    .btn::after{content:'';position:absolute;top:-50%;left:-60%;width:60%;height:200%;background:linear-gradient(to right,rgba(255,255,255,0) 0%,rgba(255,255,255,0.35) 50%,rgba(255,255,255,0) 100%);transform:rotate(20deg);transition:left .6s cubic-bezier(.4,0,.2,1);pointer-events:none}
    .btn:active{opacity:.88}
    .btn:active::after{left:120%}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .msg{font-size:13px;text-align:center;margin-top:14px;min-height:20px;padding:10px;border-radius:10px;font-weight:500}
    .msg.error{background:rgba(255,180,171,0.1);color:var(--danger);border:1px solid rgba(255,180,171,0.2)}
    .msg.ok{background:rgba(127,227,196,0.1);color:var(--success);border:1px solid rgba(127,227,196,0.2)}
    .hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.6;margin-top:20px;font-weight:500}
  </style>
</head>
<body>
<div class="bg-blobs"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<div class="wrap">
  <div class="logo"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--on-accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 21 12 12 21 3 12 Z"/><path d="M8 13l3-3 2 2 4-4"/></svg></div>
  <div class="title">Mis <span>Gastos</span></div>
  <div class="subtitle">Controlá tus finanzas</div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="setTab('login')">Ingresar</button>
      <button class="tab" onclick="setTab('register')">Registrarse</button>
    </div>
    <div id="panel-login">
      <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="tu@email.com" autocomplete="email"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn" id="btn-login" onclick="login()">Ingresar</button>
    </div>
    <div id="panel-register" style="display:none">
      <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="tu@email.com" autocomplete="email"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="r-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password"></div>
      <div class="field"><label>Confirmar contraseña</label><input type="password" id="r-pass2" placeholder="Repetí la contraseña"></div>
      <button class="btn" id="btn-register" onclick="register()">Crear cuenta</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>
  <div class="hint">Tus datos se guardan de forma segura<br>y solo vos podés verlos.</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL='https://rujgpkiuhofndbmcntuj.supabase.co';
  const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1amdwa2l1aG9mbmRibWNudHVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NjUxMDksImV4cCI6MjA5ODI0MTEwOX0.XppKMyyg53h32L5iBeo6B3LwAe_1VW1_9eas8ysuwYc';
  const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='app.html';});
  function setTab(t){
    document.getElementById('panel-login').style.display=t==='login'?'':'none';
    document.getElementById('panel-register').style.display=t==='register'?'':'none';
    document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='login')||(i===1&&t==='register')));
    setMsg('');
  }
  function setMsg(txt,type='error'){const el=document.getElementById('msg');el.textContent=txt;el.className='msg'+(txt?' '+type:'');}
  function setLoading(id,on){const b=document.getElementById(id);b.disabled=on;b.textContent=on?'Cargando...':(id==='btn-login'?'Ingresar':'Crear cuenta');}
  async function login(){
    const email=document.getElementById('l-email').value.trim();
    const pass=document.getElementById('l-pass').value;
    if(!email||!pass){setMsg('Completá todos los campos');return;}
    setLoading('btn-login',true);
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){setMsg(trad(error.message));setLoading('btn-login',false);return;}
    window.location.href='app.html';
  }
  async function register(){
    const email=document.getElementById('r-email').value.trim();
    const pass=document.getElementById('r-pass').value;
    const pass2=document.getElementById('r-pass2').value;
    if(!email||!pass){setMsg('Completá todos los campos');return;}
    if(pass!==pass2){setMsg('Las contraseñas no coinciden');return;}
    if(pass.length<6){setMsg('La contraseña debe tener al menos 6 caracteres');return;}
    setLoading('btn-register',true);
    const{error}=await sb.auth.signUp({email,password:pass});
    if(error){setMsg(trad(error.message));setLoading('btn-register',false);return;}
    setMsg('Cuenta creada. Ya podés ingresar.','ok');
    setLoading('btn-register',false);
    setTimeout(()=>setTab('login'),2000);
  }
  function trad(m){
    if(m.includes('Invalid login'))return'Email o contraseña incorrectos';
    if(m.includes('already registered'))return'Este email ya tiene una cuenta';
    if(m.includes('valid email'))return'El email no es válido';
    return'Error: '+m;
  }
  document.addEventListener('keydown',e=>{
    if(e.key!=='Enter')return;
    if(document.getElementById('panel-login').style.display!=='none')login();else register();
  });
</script>
</body>
</html>
